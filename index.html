<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 نشر وتعديل فيلم - بلوجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #e50914;
      --accent2: #ff6b35;
      --accent3: #3b82f6;
      --text: #f0f0f0;
      --muted: #666;
      --input-bg: #0d0d14;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 580px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header .logo { font-size: 42px; }
    .header h1 { font-size: 22px; font-weight: 900; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
    label span { color: var(--accent); }
    input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 14px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #333; }
    .preview {
      display: none; margin-bottom: 18px; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--border);
      aspect-ratio: 16/9; background: #000;
    }
    .preview img { width: 100%; height: 100%; object-fit: cover; }
    .btn-primary {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(229,9,20,0.35); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent3), #1e3a8a);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 12px;
    }
    .btn-secondary:hover { transform: translateY(-1px); }
    .result {
      display: none; margin-top: 20px; padding: 16px;
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
    }
    .result p { font-size: 13px; color: #22c55e; margin-bottom: 10px; font-weight: 600; }
    .result-link { display: flex; gap: 8px; margin-bottom: 12px; }
    .result-link input { background: rgba(0,0,0,0.3); border-color: rgba(34,197,94,0.2); font-size: 12px; padding: 10px 12px; direction: ltr; }
    .copy-btn {
      padding: 10px 16px; background: #22c55e; border: none; border-radius: 8px;
      color: #000; font-weight: 700; cursor: pointer;
    }
    .convert-section {
      display: none; margin-top: 15px; padding-top: 15px;
      border-top: 1px solid var(--border);
    }
    .convert-section label { font-size: 12px; color: #fbbf24; }
    .convert-section input { font-size: 12px; }
    .error {
      display: none; margin-top: 16px; padding: 14px 16px;
      background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.2);
      border-radius: 10px; font-size: 13px; color: #f87171;
    }
    .note { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .login-btn {
      width: 100%; padding: 12px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px; color: #aaa;
      font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn.logged { border-color: #22c55e; color: #22c55e; cursor: default; }
    .flex { display: flex; gap: 10px; align-items: center; }
    .badge { background: rgba(229,9,20,0.2); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 11px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🎬</div>
    <h1>نشر فيلم على بلوجر</h1>
    <p>انشر الفيلم | وبعدين حوله لرابط تاني لو بوظ</p>
  </div>
  <div class="card">

    <button id="loginBtn" class="login-btn" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      تسجيل الدخول بـ Google
    </button>

    <div class="preview" id="posterPreview">
      <img id="posterImg" src="" alt="بوستر">
    </div>

    <div class="field">
      <label>🎞️ اسم الفيلم <span>*</span></label>
      <input type="text" id="movieTitle" placeholder="مثال: فيلم Project Hail Mary 2026 مترجم">
    </div>
    <div class="field">
      <label>🖼️ رابط البوستر <span>*</span></label>
      <input type="url" id="posterUrl" placeholder="https://...jpg">
    </div>
    <div class="field">
      <label>▶️ رابط الفيديو (m3u8) <span>*</span></label>
      <input type="url" id="streamUrl" placeholder="https://...master.m3u8">
    </div>

    <button id="publishBtn" class="btn-primary" onclick="publish()" disabled>🚀 نشر الفيلم</button>

    <div class="result" id="result">
      <p>✅ تم النشر بنجاح! اتفضل الرابط:</p>
      <div class="result-link">
        <input type="text" id="resultUrl" readonly>
        <button class="copy-btn" onclick="copyLink()">نسخ</button>
      </div>
      <div class="convert-section" id="convertSection">
        <label>🔄 رابط التحويل الجديد (لو الفيديو بوظ)</label>
        <input type="url" id="redirectUrl" placeholder="https://vipserver.liiivideo.com/embed-xxxxx.html">
        <div class="note">هيحول المنشور لـ meta refresh للرابط ده</div>
        <button class="btn-secondary" onclick="convertPost()">✏️ تحويل المنشور</button>
      </div>
    </div>

    <div class="error" id="errorBox"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  var CLIENT_ID  = "434426979329-hh0vpjbq6prt7qrjh4oqn76rmmmeube9.apps.googleusercontent.com";
  var BLOG_ID    = "4946697490233363512";
  var SCOPES     = "https://www.googleapis.com/auth/blogger";
  var accessToken = null;
  var tokenClient = null;
  var lastPublishedPostId = null;
  var lastPublishedTitle = null;

  document.getElementById('posterUrl').addEventListener('input', function() {
    var url = this.value.trim();
    var preview = document.getElementById('posterPreview');
    var img = document.getElementById('posterImg');
    if (url) { img.src = url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  });

  window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(resp) {
        if (resp.error) { showError("فشل تسجيل الدخول: " + resp.error); return; }
        accessToken = resp.access_token;
        var btn = document.getElementById('loginBtn');
        btn.innerHTML = '✅ تم تسجيل الدخول بنجاح';
        btn.classList.add('logged');
        document.getElementById('publishBtn').disabled = false;
      }
    });
  };

  function doLogin() { tokenClient.requestAccessToken(); }

  function publish() {
    var title  = document.getElementById('movieTitle').value.trim();
    var poster = document.getElementById('posterUrl').value.trim();
    var stream = document.getElementById('streamUrl').value.trim();
    hideError();
    if (!title)  { showError("⚠️ اكتب اسم الفيلم"); return; }
    if (!poster) { showError("⚠️ حط رابط البوستر"); return; }
    if (!stream) { showError("⚠️ حط رابط الفيديو"); return; }
    if (!accessToken) { showError("⚠️ سجّل الدخول الأول"); return; }

    var btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري النشر...';

    var content = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔹${title.replace(/"/g, '\\"')}🔹</title>
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"><\/script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"><\/script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="player"></div>
<script>
  jwplayer("player").setup({
    sources: [{ file: "${stream.replace(/"/g, '\\"')}", label: "Auto" }],
    image: "${poster.replace(/"/g, '\\"')}",
    title: "🔹${title.replace(/"/g, '\\"')}🔹",
    width: "100%",
    height: "100%",
    stretching: "exactfit",
    duration: "1814400",
    preload: "auto",
    androidhls: true,
    hlshtml: true,
    primary: "html5",
    startparam: "start",
    playbackRateControls: true,
    playbackRates: [0.5, 1, 1.25, 1.5, 2],
    tracks: [],
    cast: {},
    abouttext: "",
    aboutlink: "",
    sharing: { sites: [] }
  });
<\/script>
</body>
</html>`;

    fetch("https://www.googleapis.com/blogger/v3/blogs/" + BLOG_ID + "/posts/", {
      method: "POST",
      headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ title: "🔹" + title + "🔹", content: content })
    })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      btn.textContent = '🚀 نشر الفيلم';
      if (data.url) {
        document.getElementById('resultUrl').value = data.url;
        document.getElementById('result').style.display = 'block';
        document.getElementById('convertSection').style.display = 'block';
        lastPublishedPostId = data.id;
        lastPublishedTitle = title;
        showError("✅ تم النشر بنجاح! دلوقتي تقدر تحوله لو حابب");
        setTimeout(() => hideError(), 3000);
      } else {
        showError("⚠️ " + (data.error ? data.error.message : "حصل خطأ"));
      }
    })
    .catch(err => { btn.disabled = false; btn.textContent = '🚀 نشر الفيلم'; showError("⚠️ " + err.message); });
  }

  // تحويل المنشور لـ meta refresh
  async function convertPost() {
    var postId = lastPublishedPostId;
    var redirectTo = document.getElementById('redirectUrl').value.trim();
    var newTitle = document.getElementById('movieTitle').value.trim() || lastPublishedTitle;
    
    hideError();
    if (!postId) { showError("⚠️ مفيش منشور تم نشره حديثاً"); return; }
    if (!redirectTo) { showError("⚠️ حط رابط التحويل الجديد"); return; }
    if (!accessToken) { showError("⚠️ سجّل الدخول الأول"); return; }

    var btn = document.querySelector('.btn-secondary');
    var originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ جاري التحويل...';

    try {
      var newContent = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔹${newTitle.replace(/"/g, '\\"')}🔹</title>
  <meta http-equiv="refresh" content="4;url=${redirectTo.replace(/"/g, '\\"')}">
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; color: white; }
    .loading { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #e50914; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p>جاري التحويل إلى المشغل ...</p>
  <p style="font-size:12px;color:#666;">سيتم التحويل تلقائياً خلال 4 ثوانٍ</p>
</div>
</body>
</html>`;

      let updateRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}/posts/${postId}`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify({ title: "🔹" + newTitle + "🔹", content: newContent })
      });
      
      let result = await updateRes.json();
      btn.disabled = false;
      btn.textContent = originalText;
      
      if (result.url) {
        document.getElementById('resultUrl').value = result.url;
        showError("✅ تم التحويل! المنشور بقا يحول لـ " + redirectTo);
        document.getElementById('redirectUrl').value = "";
        document.getElementById('convertSection').style.display = 'none';
        setTimeout(() => hideError(), 4000);
      } else {
        showError("⚠️ " + (result.error ? result.error.message : "فشل التحويل"));
      }
    } catch(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      showError("⚠️ " + err.message);
    }
  }

  function copyLink() {
    var input = document.getElementById('resultUrl');
    input.select();
    document.execCommand('copy');
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '✔ تم النسخ';
    setTimeout(() => { btn.textContent = 'نسخ'; }, 2000);
  }

  function showError(msg) {
    var el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }
</script>
</body>
</html>
